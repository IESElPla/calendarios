<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {

    --text: #1a1a18; --text2: #5f5e5a; --text3: #888780;

    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe9; --text2: #b4b2a9; --text3: #888780;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 900px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
  .header i { font-size: 24px; color: var(--text2); }
  .header h1 { font-size: 20px; font-weight: 500; }
  .header span { font-size: 13px; color: var(--text2); margin-left: 4px; }

  .search-wrap { position: relative; margin-bottom: 0.75rem; }
  .search-wrap .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text2); pointer-events: none; }
  #search { width: 100%; padding: 10px 36px 10px 36px; font-size: 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); font-family: inherit; }
  #search:focus { outline: none; border-color: #AFA9EC; box-shadow: 0 0 0 3px #EEEDFE55; }
  #search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text2); font-size: 15px; display: none; font-family: inherit; }
  .search-bar { font-size: 12px; color: var(--text2); margin: 0 0 12px; min-height: 18px; }
  .search-bar mark { background: #EEEDFE; color: #3C3489; border-radius: 3px; padding: 0 3px; font-style: normal; font-weight: 500; }

  .filter-group { margin-bottom: 12px; }
  .filter-group-label { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; display: flex; align-items: center; gap: 6px; }
  .filter-group-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .filters { display: flex; flex-wrap: wrap; gap: 6px; }

  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn:hover { background: var(--bg2); }
  .filter-btn.active-all  { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
  .filter-btn.active-info { background: #E6F1FB; color: #0C447C; border-color: #85B7EB; }
  .filter-btn.active-img-cfgb { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
  .filter-btn.active-img-cfgm { background: #FAEEDA; color: #633806; border-color: #EF9F27; }
  .filter-btn.active-img-cfgs { background: #FAECE7; color: #712B13; border-color: #F0997B; }

  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 12px 0 1rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-cfgb { background: #5DCAA5; } .dot-cfgm { background: #EF9F27; } .dot-cfgs { background: #F0997B; }

  .day-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 600px) { .day-cols { grid-template-columns: 1fr; } }
  .day-col { background: var(--bg2); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
  .day-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 8px; }
  .day-header .dia { font-size: 22px; font-weight: 500; }
  .day-header .mes { font-size: 13px; color: var(--text2); }
  .day-header .cnt { margin-left: auto; font-size: 12px; color: var(--text3); }
  .entries { padding: 8px; display: flex; flex-direction: column; gap: 6px; max-height: 560px; overflow-y: auto; }
  .entry { border-radius: var(--radius); padding: 9px 12px; border: 1px solid transparent; cursor: pointer; transition: filter 0.12s; }
  .entry:hover { filter: brightness(0.94); }
  .entry.nivel-cfgb { background: #E1F5EE; border-color: #9FE1CB; }
  .entry.nivel-cfgm { background: #FAEEDA; border-color: #FAC775; }
  .entry.nivel-cfgs { background: #FAECE7; border-color: #F5C4B3; }
  .entry .mod { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .entry.nivel-cfgb .mod { color: #085041; }
  .entry.nivel-cfgm .mod { color: #633806; }
  .entry.nivel-cfgs .mod { color: #712B13; }
  .entry .cic { font-size: 11px; margin-bottom: 4px; }
  .entry.nivel-cfgb .cic { color: #0F6E56; }
  .entry.nivel-cfgm .cic { color: #854F0B; }
  .entry.nivel-cfgs .cic { color: #993C1D; }
  .entry .meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; color: #5f5e5a; }
  .entry .meta span { display: flex; align-items: center; gap: 3px; }
  .entry mark { background: #FAC775; color: #412402; border-radius: 2px; padding: 0 1px; font-style: normal; }
  .empty { padding: 2rem; text-align: center; font-size: 13px; color: var(--text3); }
  .empty i { font-size: 26px; display: block; margin: 0 auto 8px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.42); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border2); padding: 1.25rem 1.5rem; max-width: 370px; width: 92%; position: relative; }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 0.5rem; }
  .modal-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text2); font-family: inherit; }
  .modal-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .modal-row:last-child { border-bottom: none; }
  .modal-label { color: var(--text2); min-width: 72px; }
  .modal-val { font-weight: 500; }
  .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-bottom: 10px; }
  footer { text-align: center; font-size: 11px; color: var(--text3); margin-top: 2rem; }
</style>

// ── Helpers ───────────────────────────────────────────────────────────────────
function esInfo(c)    { return c.includes('SMR') || c.includes('DAM'); }
function normalize(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

function shortName(c) {
  return c
    .replace('Electricidad y Electrónica', 'Elec.')
    .replace('Peluquería y Estética', 'Pelq.')
    .replace('Asesoría de Imagen', 'Asesoría')
    .replace('Estética y Belleza', 'Est. Belleza')
    .replace('Estética Integral y Bienestar', 'Est. Integral')
    .replace('Caracterización', 'Caracteriz.');
}

function highlight(text, term) {
  if (!term) return text;
  const idx = normalize(text).indexOf(normalize(term));
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + term.length) + '</mark>' + text.slice(idx + term.length);
}

// ── Estado ────────────────────────────────────────────────────────────────────
let activeFilter = 'ALL';
let searchTerm   = '';

// ── Referencias DOM ───────────────────────────────────────────────────────────
const filtersInfo  = document.getElementById('filters-info');
const filtersImg   = document.getElementById('filters-img');
const searchEl     = document.getElementById('search');
const clearBtn     = document.getElementById('search-clear');
const searchBarEl  = document.getElementById('search-bar');
const modal        = document.getElementById('modal-bg');
const modalContent = document.getElementById('modal-content');

// ── Construir filtros ─────────────────────────────────────────────────────────
const allBtn = document.createElement('button');
allBtn.className   = 'filter-btn active-all';
allBtn.dataset.f   = 'ALL';
allBtn.dataset.fam = 'all';
allBtn.textContent = 'Todos';
filtersInfo.appendChild(allBtn);

const ciclos = [...new Set(data.map(d => d.ciclo))].sort();
ciclos.forEach(c => {
  const info  = esInfo(c);
  const nivel = data.find(d => d.ciclo === c).nivel;
  const btn   = document.createElement('button');
  btn.className     = 'filter-btn';
  btn.dataset.f     = c;
  btn.dataset.fam   = info ? 'info' : 'img';
  btn.dataset.nivel = nivel;
  btn.textContent   = shortName(c);
  (info ? filtersInfo : filtersImg).appendChild(btn);
});

// ── Clase activa ──────────────────────────────────────────────────────────────
function applyActiveClass(btn) {
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.remove('active-all', 'active-info', 'active-img-cfgb', 'active-img-cfgm', 'active-img-cfgs')
  );
  const fam   = btn.dataset.fam;
  const nivel = btn.dataset.nivel || '';
  if (fam === 'all')  btn.classList.add('active-all');
  if (fam === 'info') btn.classList.add('active-info');
  if (fam === 'img')  btn.classList.add('active-img-' + nivel);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderDay(day) {
  const col = document.getElementById('day' + day);
  const cnt = document.getElementById('c' + day);
  col.innerHTML = '';
  const nt = normalize(searchTerm);
  const items = data
    .filter(d => d.fecha === day)
    .filter(d => activeFilter === 'ALL' || d.ciclo === activeFilter)
    .filter(d => !searchTerm ||
      normalize(d.modulo).includes(nt) ||
      normalize(d.ciclo).includes(nt)  ||
      normalize(d.prof).includes(nt))
    .sort((a, b) => a.hora.localeCompare(b.hora));

  cnt.textContent = items.length + ' prueba' + (items.length !== 1 ? 's' : '');

  if (!items.length) {
    col.innerHTML = '<div class="empty"><i class="ti ti-calendar-off"></i>Sin resultados</div>';
    return;
  }
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'entry nivel-' + item.nivel;
    div.innerHTML =
      '<div class="mod">'  + highlight(item.modulo, searchTerm) + '</div>' +
      '<div class="cic">'  + highlight(item.ciclo,  searchTerm) + '</div>' +
      '<div class="meta">' +
        '<span><i class="ti ti-clock"></i> '     + item.hora + '</span>' +
        '<span><i class="ti ti-door"></i> Aula ' + item.aula + '</span>' +
        '<span><i class="ti ti-user"></i> '      + highlight(item.prof, searchTerm) + '</span>' +
      '</div>';
    div.addEventListener('click', () => {
      const colors = { cfgb:['#9FE1CB','#04342C'], cfgm:['#FAC775','#412402'], cfgs:['#F5C4B3','#4A1B0C'] };
      const [bg, tc] = colors[item.nivel];
      modalContent.innerHTML =
        '<h2>' + item.modulo + '</h2>' +
        '<span class="pill" style="background:' + bg + ';color:' + tc + '">' + item.nivel.toUpperCase() + '</span>' +
        '<div class="modal-row"><span class="modal-label"><i class="ti ti-books"></i> Ciclo</span><span class="modal-val">'   + item.ciclo + '</span></div>' +
        '<div class="modal-row"><span class="modal-label"><i class="ti ti-calendar"></i> Fecha</span><span class="modal-val">' + item.fecha + '/06/2026 · ' + item.hora + '</span></div>' +
        '<div class="modal-row"><span class="modal-label"><i class="ti ti-door"></i> Aula</span><span class="modal-val">'     + item.aula + '</span></div>' +
        '<div class="modal-row"><span class="modal-label"><i class="ti ti-user"></i> Profesor</span><span class="modal-val">' + item.prof + '</span></div>';
      modal.classList.add('open');
    });
    col.appendChild(div);
  });
}

function updateBar() {
  if (!searchTerm) { searchBarEl.innerHTML = ''; return; }
  const nt = normalize(searchTerm);
  const total = data.filter(d => {
    const ok = activeFilter === 'ALL' || d.ciclo === activeFilter;
    return ok && (normalize(d.modulo).includes(nt) || normalize(d.ciclo).includes(nt) || normalize(d.prof).includes(nt));
  }).length;
  searchBarEl.innerHTML = total > 0
    ? total + ' resultado' + (total !== 1 ? 's' : '') + ' para <mark>' + searchTerm + '</mark>'
    : 'Sin resultados para <mark>' + searchTerm + '</mark>';
}

function render() { updateBar(); renderDay('25'); renderDay('26'); }

// ── Eventos ───────────────────────────────────────────────────────────────────
[filtersInfo, filtersImg].forEach(group => {
  group.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    searchEl.value = ''; searchTerm = '';
    clearBtn.style.display = 'none'; searchBarEl.innerHTML = '';
    activeFilter = btn.dataset.f;
    applyActiveClass(btn);
    render();
  });
});

searchEl.addEventListener('input', () => {
  searchTerm = searchEl.value.trim();
  clearBtn.style.display = searchTerm ? 'block' : 'none';
  if (searchTerm) { activeFilter = 'ALL'; applyActiveClass(allBtn); }
  render();
});

clearBtn.addEventListener('click', () => {
  searchEl.value = ''; searchTerm = '';
  clearBtn.style.display = 'none'; searchBarEl.innerHTML = '';
  render(); searchEl.focus();
});

document.getElementById('modal-close').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

render();
</script>
